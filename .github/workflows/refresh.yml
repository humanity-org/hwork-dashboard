name: Refresh dashboard data

# Regenerates data/issues.json from Project #4 (read-only) and commits it.
# GitHub Pages (deploy-from-branch: main / root) rebuilds automatically on the commit.
# The agent does NOT run this — it is a deterministic Action. No HTML is ever generated.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min; adjust as needed
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write              # to commit the refreshed data file

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate issues.json from the project board
        env:
          GH_TOKEN: ${{ secrets.HWORK_DASHBOARD_TOKEN }}   # fine-grained PAT: read org projects + repo read
          ORG: humanity-org
          PROJECT: "4"
          REPO: humanwork
        run: node scripts/build-data.mjs

      - name: Commit if data changed
        run: |
          git config user.name "hwork-dashboard-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/issues.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh dashboard data [skip ci]"
            git push
          fi
